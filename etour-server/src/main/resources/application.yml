server:
  port: ${SERVER_PORT:8888}
  servlet:
    context-path: ${SERVER_CONTEXT_PATH:/api}

spring:
  application:
    name: etour-backend
  
  # 数据源配置
  # 注意：实际数据库配置应存储在.env文件中，此处为占位符
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: ${DB_URL:jdbc:mysql://localhost:3306/etour?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
      username: ${DB_USERNAME:root}
      password: ${DB_PASSWORD:YOUR_DB_PASSWORD_HERE}
      initial-size: 10
      max-active: 100
      min-idle: 10
      max-wait: 60000
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1 FROM DUAL
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin
      filter:
        stat:
          log-slow-sql: true
          slow-sql-millis: 1000
          merge-sql: false
        wall:
          config:
            multi-statement-allow: true

  # Redis配置
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}
    timeout: 10000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

# MyBatis Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    jdbc-type-for-null: 'null'
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  type-aliases-package: com.etour.entity
  mapper-locations: classpath:mapper/*.xml

# SpringDoc配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /doc.html
    tags-sorter: alpha
    operations-sorter: alpha
  packages-to-scan: com.etour.controller

# 日志配置
logging:
  level:
    com.etour: debug
    org.springframework.security: debug
    org.springframework.web.servlet: debug
    org.springframework.boot.autoconfigure: debug
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'
  file:
    name: logs/etour.log

# JWT配置
# 注意：实际密钥应存储在.env文件中，此处为占位符
jwt:
  secret: ${JWT_SECRET:YOUR_JWT_SECRET_KEY_HERE}
  expiration: 86400000 # 24小时
  header: Authorization
  prefix: Bearer

# 文件上传配置
file:
  upload:
    path: uploads/avatar
  access:
    prefix: /uploads/avatar

# 阿里云OSS配置
# 注意：实际密钥应存储在.env文件中，此处为占位符
aliyun:
  oss:
    endpoint: ${ALIYUN_OSS_ENDPOINT:https://oss-cn-hangzhou.aliyuncs.com}
    endpoint-cname: ${ALIYUN_OSS_ENDPOINT_CNAME:}
    endpoint-internal: ${ALIYUN_OSS_ENDPOINT_INTERNAL:}
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:YOUR_ALIYUN_ACCESS_KEY_ID_HERE}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:YOUR_ALIYUN_ACCESS_KEY_SECRET_HERE}
    bucket-name: ${ALIYUN_OSS_BUCKET_NAME:YOUR_OSS_BUCKET_NAME_HERE}
    url-prefix: ${ALIYUN_OSS_URL_PREFIX:}
    url-prefix-cname: ${ALIYUN_OSS_URL_PREFIX_CNAME:}
    url-prefix-internal: ${ALIYUN_OSS_URL_PREFIX_INTERNAL:}
